server:
  port: 8080

spring:
  application:
    name: kr-stock-daily-brief
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:kr_stock_daily_brief}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:app}
    password: ${DB_PASSWORD:app}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  publicKey: ${PUBLIC_KEY:}
  adminKey: ${ADMIN_KEY:}

marketdata:
  provider: ${MARKETDATA_PROVIDER:placeholder}
  baseUrl: ${MARKETDATA_BASE_URL:http://marketdata:8000}


name: Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Run backend tests
        run: ./gradlew test

  frontend:
    name: Frontend build and E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Prepare local environment
        run: |
          cp .env.example .env
          echo "APP_ADMIN_TRUSTED_CIDRS=127.0.0.1/32,::1/128,172.16.0.0/12" >> .env
      - name: Start full stack
        run: docker compose up -d --build
      - name: Wait for stack health
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/actuator/health >/dev/null && \
               curl -fsS http://localhost:5173/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs --tail=120 frontend backend marketdata ai-service
          exit 1
      - name: API smoke tests
        run: ./scripts/test_all_apis.sh
      - name: Investment language safety check
        run: ./scripts/verify_investment_language.sh
      - name: Browser E2E tests
        working-directory: frontend
        run: npm run test:e2e -- --reporter=line
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: ignore
      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs --tail=180

name: Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
      TESTCONTAINERS_CHECKS_DISABLE: "true"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Run backend tests
        run: ./gradlew test --no-daemon --stacktrace
      - name: Print backend test failures
        if: failure()
        working-directory: .
        run: make ci-test-report
      - name: Upload backend test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/build/reports/tests/test
            backend/build/test-results/test
          if-no-files-found: ignore

  frontend:
    name: Frontend build and E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --include=dev
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Prepare local environment
        run: |
          cp .env.example .env
          echo "APP_ADMIN_TRUSTED_CIDRS=127.0.0.1/32,::1/128,172.16.0.0/12" >> .env
      - name: Operational config and secret guard
        run: make ops-check
      - name: Start full stack
        run: docker compose up -d --build
      - name: Wait for stack health
        run: |
          docker compose ps
          make health || {
            docker compose ps
            docker compose logs --tail=120 frontend backend marketdata ai-service
            exit 1
          }
      - name: API smoke tests
        run: ./scripts/test_all_apis.sh
      - name: Investment language safety check
        run: ./scripts/verify_investment_language.sh
      - name: Browser E2E tests
        working-directory: frontend
        run: npm run test:e2e -- --reporter=line
      - name: Optional deployment smoke tests
        env:
          DEPLOY_FRONTEND_URL: ${{ secrets.DEPLOY_FRONTEND_URL }}
          DEPLOY_BACKEND_URL: ${{ secrets.DEPLOY_BACKEND_URL }}
          DEPLOY_PUBLIC_KEY: ${{ secrets.DEPLOY_PUBLIC_KEY }}
        run: |
          if [ -z "$DEPLOY_FRONTEND_URL" ] && [ -z "$DEPLOY_BACKEND_URL" ]; then
            echo "Skipping deployment smoke tests because no DEPLOY_* URL secrets are configured."
            exit 0
          fi
          make deploy-smoke
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: ignore
      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs --tail=180
